services:
  math4ai:
    build:
      context: ..
      dockerfile: container/Containerfile
    container_name: math4ai
    user: "0:0"
    environment:
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    volumes:
      - ..:/app
      - /app/__pycache__
    command: sh -c "mkdir -p /app/results /app/figures && python scripts/linear_gaussian.py && python scripts/linear_gaussian_hidden_layer.py && python scripts/moons_hidden_layer.py && python scripts/moons.py"